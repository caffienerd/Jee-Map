<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>JEE Map</title>

        <!-- PWA -->
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#0d0d0f" id="themeMetaColor" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="JEEMap" />

        <!-- Favicon -->
        <link
            rel="icon"
            type="image/png"
            sizes="192x192"
            href="icons/icon-xxxhdpi/ic_launcher_round.png"
        />
        <link rel="apple-touch-icon" href="icons/icon-192.png" />

        <!-- Supabase -->
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <!-- Styles (split) -->
        <link rel="stylesheet" href="style/base.css" />
        <link rel="stylesheet" href="style/tags.css" />
        <link rel="stylesheet" href="style/header.css" />
        <link rel="stylesheet" href="style/chapters.css" />
        <link rel="stylesheet" href="style/stats.css" />
        <link rel="stylesheet" href="style/auth.css" />
        <link rel="stylesheet" href="style/loading.css" />
        <link rel="stylesheet" href="style/notes.css" />
    </head>
    <body>
        <!-- ── INITIAL LOAD SCREEN ── -->
        <div id="appLoader">
            <div class="loader-logo">JEE<span>MAP</span></div>
            <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
            <div class="loader-sub">loading progress...</div>
        </div>

        <!-- ── PROFILE SWITCH FLASH ── -->
        <div id="switchFlash">
            <div class="switch-flash-name" id="switchFlashName"></div>
            <div class="switch-flash-sub">loading profile...</div>
        </div>

        <header>
            <div class="header-top">
                <div class="logo-group">
                    <span class="logo"
                        >JEE<span class="logo-accent">MAP</span></span
                    >
                    <span class="tagline">know before you go</span>
                </div>
                <div id="authBtn" class="auth-wrap"></div>
                <button id="themeToggle">☀ light</button>
            </div>
            <div class="search-wrap">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="search topic, chapter..."
                    autocomplete="off"
                />
                <span class="search-icon">⌕</span>
                <button id="filterBtn" title="Filter by tag">
                    <svg
                        width="15"
                        height="15"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2.2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <polygon
                            points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"
                        />
                    </svg>
                    <span class="filter-count"></span>
                </button>
            </div>
            <div id="filterPanel"></div>

            <!--
      Tabs are rendered dynamically by main.js via renderTabs(viewingUserId).
      JEE  users get: Stats | Physics | Chemistry | Maths   | Notes
      NEET users get: Stats | Physics | Chemistry | Biology | Notes
    -->
            <div class="tabs" id="tabsContainer"></div>
        </header>

        <main id="main"></main>

        <!--
    Load order: data → storage → auth → sync → notes → main
    All four subject files are loaded upfront so switching profiles
    never requires a page reload. DATA is keyed by exam type in main.js.
  -->
        <script src="script/tags.js"></script>
        <script src="script/storage.js"></script>

        <!-- JEE subjects -->
        <script src="script/subjects/JEE/physics.js"></script>
        <script src="script/subjects/JEE/chemistry.js"></script>
        <script src="script/subjects/JEE/maths.js"></script>

        <!-- NEET subjects -->
        <script src="script/subjects/NEET/physics.js"></script>
        <script src="script/subjects/NEET/chemistry.js"></script>
        <script src="script/subjects/NEET/biology.js"></script>

        <script src="script/supabase.js"></script>
        <script src="script/auth.js"></script>
        <script src="script/sync.js"></script>
        <script src="script/notes.js"></script>
        <script src="script/main.js"></script>

        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("./sw.js")
                        .catch((err) =>
                            console.warn("SW registration failed:", err),
                        );
                });
            }
        </script>
    </body>
</html>
